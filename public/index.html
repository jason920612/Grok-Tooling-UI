<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grok Tooling UI</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <aside class="sidebar">
        <div class="brand">Grok Tooling UI</div>
        <p>Grok-like chat, but with planner, tools, source policy, and verifier.</p>
        <div class="pill">Node + TypeScript</div>
        <div class="pill">Planner first</div>
        <div class="pill">Tool traces</div>
        <div class="history-header">
          <h2>History</h2>
          <button id="new-thread" type="button">New</button>
        </div>
        <div id="thread-list" class="thread-list"></div>
      </aside>

      <section class="chat-shell">
        <header>
          <div>
            <h1>Ask with verification</h1>
            <p>模型先懷疑、查工具，再回答。</p>
          </div>
          <button id="clear">Clear</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="composer" class="composer">
          <textarea id="input" placeholder="輸入問題，例如：這個說法有沒有可能過期？" rows="3"></textarea>
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="studio-shell">
        <header class="studio-header">
          <div>
            <h2>Studio</h2>
            <p>Preview, downloads, and execution outputs</p>
          </div>
          <select id="studio-language" aria-label="Studio language">
            <option value="html">HTML</option>
            <option value="javascript">JavaScript</option>
            <option value="css">CSS</option>
          </select>
        </header>

        <div class="studio-policy">
          <strong>Sandbox:</strong>
          <span id="workspace-path"></span>
        </div>

        <textarea id="studio-code" class="studio-code" spellcheck="false"></textarea>

        <div class="studio-actions">
          <button id="run-studio" type="button">Run</button>
          <button id="save-artifact" type="button">Save artifact</button>
        </div>

        <div id="studio-status" class="studio-status"></div>
        <iframe id="studio-preview" class="studio-preview" sandbox="allow-scripts"></iframe>

        <section class="artifacts">
          <h3>Persistent files</h3>
          <div id="artifact-list" class="artifact-list"></div>
        </section>
      </aside>
    </main>

    <template id="message-template">
      <article class="message">
        <div class="role"></div>
        <div class="content"></div>
      </article>
    </template>

    <script src="/main.js"></script>
    <script src="/execution-artifacts.js"></script>
  </body>
</html>
